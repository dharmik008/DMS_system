{% extends 'admin/base.html' %}
{% block title %}Add User — Caryanams Admin{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>Add New User</h1><p>Create a new customer/buyer account</p></div>
  <a href="{{ url_for('admin.all_users') }}" class="btn btn-outline btn-sm">← Back</a>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-header"><span class="card-title">User Details</span></div>
  <div style="padding:24px;">
    <form method="POST">
      <div class="form-group" style="margin-bottom:16px;">
        <label>Full Name *</label>
        <input type="text" name="name" class="form-control" value="{{ form.get('name','') }}" required placeholder="e.g. Amit Shah">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Email Address *</label>
        <input type="email" name="email" class="form-control" value="{{ form.get('email','') }}" required placeholder="user@example.com">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Phone Number</label>
        <input type="text" name="phone" class="form-control" value="{{ form.get('phone','') }}" placeholder="9876543210">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>City</label>
        <input type="text" name="city" class="form-control" value="{{ form.get('city','') }}" placeholder="Ahmedabad">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Password</label>
        <input type="text" name="password" class="form-control" value="user123" placeholder="Min 6 characters">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Status</label>
        <select name="is_active" class="form-control">
          <option value="1">Active</option>
          <option value="0">Blocked</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Add User</button>
        <a href="{{ url_for('admin.all_users') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
