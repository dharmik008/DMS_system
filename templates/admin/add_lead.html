{% extends 'admin/base.html' %}
{% block title %}Add Lead — Caryanams Admin{% endblock %}
{% block page_title %}Add Lead{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>Add New Lead</h1><p>Create a new customer lead</p></div>
  <a href="{{ url_for('admin.all_leads') }}" class="btn btn-outline btn-sm">← Back</a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-header"><span class="card-title">Lead Details</span></div>
  <div style="padding:24px;">
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Customer Name *</label>
          <input type="text" name="customer_name" class="form-control" value="{{ form.get('customer_name','') }}" required placeholder="e.g. Priya Sharma">
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="text" name="customer_phone" class="form-control" value="{{ form.get('customer_phone','') }}" required placeholder="9876543210">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="customer_email" class="form-control" value="{{ form.get('customer_email','') }}" placeholder="customer@email.com">
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" name="customer_city" class="form-control" value="{{ form.get('customer_city','') }}" placeholder="Ahmedabad">
        </div>
        <div class="form-group">
          <label>Dealer *</label>
          <select name="dealer_id" class="form-control" required>
            <option value="">-- Select Dealer --</option>
            {% for d in dealers %}
            <option value="{{ d.id }}" {% if form.get('dealer_id')|string == d.id|string %}selected{% endif %}>
              {{ d.display_id or ('D' ~ d.id) }} — {{ d.name }} {{ ('(' + d.company_name + ')') if d.company_name else '' }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Assign Agent</label>
          <select name="agent_id" class="form-control">
            <option value="">-- Unassigned --</option>
            {% for a in agents %}
            <option value="{{ a.id }}">{{ a.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Vehicle Interest</label>
          <select name="vehicle_id" class="form-control">
            <option value="">-- No specific vehicle --</option>
            {% for v in vehicles %}
            <option value="{{ v.id }}">{{ v.make }} {{ v.model }} ({{ v.year }}) – ₹{{ '{:,.0f}'.format(v.price|float) }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Source</label>
          <select name="source" class="form-control">
            {% for src in ['website','walk-in','phone','referral','social','admin'] %}
            <option value="{{ src }}">{{ src | title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Stage</label>
          <select name="stage" class="form-control">
            {% for stage in ['new','interested','test_drive','negotiation','lost','connected','not_connected'] %}
            <option value="{{ stage }}">{{ stage | replace('_',' ') | title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Budget (₹)</label>
          <input type="number" name="budget" class="form-control" value="{{ form.get('budget','') }}" placeholder="e.g. 1500000" step="10000">
        </div>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label>Notes</label>
        <textarea name="notes" class="form-control" rows="3" placeholder="Any additional notes...">{{ form.get('notes','') }}</textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Add Lead</button>
        <a href="{{ url_for('admin.all_leads') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
