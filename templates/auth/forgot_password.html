<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Caryanams</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div style="padding:12px 24px;font-size:14px;font-weight:500;background:{% if cat=='success' %}#d1fae5;color:#065f46{% else %}#fee2e2;color:#991b1b{% endif %}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<div class="auth-wrapper">
  <div class="auth-card" style="max-width:420px;margin:80px auto">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#1a73e8,#0f5cc7);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:#fff">
        <i class="fas fa-lock"></i>
      </div>
      <h1 style="font-size:24px;font-weight:800;color:#0f172a;margin:0">Forgot Password?</h1>
      <p style="color:#64748b;font-size:14px;margin-top:8px">Enter your email and we'll send you a reset link.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div style="margin-bottom:20px">
        <label style="font-size:13px;font-weight:600;color:#0f172a;display:block;margin-bottom:6px">Email Address</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com"
          style="width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;box-sizing:border-box"
          onfocus="this.style.borderColor='#1a73e8'" onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <button type="submit" style="width:100%;padding:13px;background:#1a73e8;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:background .2s"
        onmouseover="this.style.background='#0f5cc7'" onmouseout="this.style.background='#1a73e8'">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:14px;color:#64748b">
      <a href="{{ url_for('auth.login') }}" style="color:#1a73e8;font-weight:600">
        <i class="fas fa-arrow-left" style="font-size:12px"></i> Back to Login
      </a>
    </div>
  </div>
</div>
</body>
</html>
