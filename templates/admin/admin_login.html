<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login — Caryanams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<style>
  body { background: var(--bg, #0f0f0f); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'DM Sans', sans-serif; }
  .login-wrap { width: 100%; max-width: 430px; padding: 24px; }
  .login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; justify-content: center; }
  .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #6366F1, #8B5CF6); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(99,102,241,.35); }
  .login-logo-text .name { display: block; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--text-1, #fff); }
  .login-logo-text .role { display: block; font-size: 12px; color: #a5b4fc; text-transform: uppercase; letter-spacing: .1em; }
  .role-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3); color: #a5b4fc; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
  .login-card { background: var(--surface-1, #1a1a1a); border: 1px solid var(--border, #2a2a2a); border-radius: 18px; padding: 36px; }
  .login-card h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text-1, #fff); margin: 0 0 6px; }
  .login-card p { color: var(--text-3, #888); font-size: 14px; margin: 0 0 28px; }
  .login-field { margin-bottom: 18px; }
  .login-field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2, #ccc); margin-bottom: 8px; }
  .login-field input { width: 100%; padding: 12px 14px; background: var(--surface-2, #252525); border: 1px solid var(--border, #2a2a2a); border-radius: 10px; color: var(--text-1, #fff); font-size: 14px; outline: none; box-sizing: border-box; transition: border-color .2s; }
  .login-field input:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
  .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: .02em; margin-top: 6px; transition: opacity .2s; }
  .login-btn:hover { opacity: .88; }
  .login-hint { margin-top: 20px; padding: 14px; background: var(--surface-2, #252525); border-radius: 10px; font-size: 13px; color: var(--text-3, #888); text-align: center; line-height: 1.7; }
  .login-hint strong { color: var(--text-2, #ccc); }
  .flash-login { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; margin-bottom: 20px; }
  .flash-login.error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
  .flash-login.success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
  .divider { text-align: center; margin: 20px 0 0; }
  .divider a { font-size: 13px; color: var(--text-3, #888); text-decoration: none; }
  .divider a:hover { color: #6366F1; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon" style="background:none;box-shadow:none;border:none;">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Caryanams" style="width:48px;height:48px;object-fit:contain;">
    </div>
    <div class="login-logo-text">
      <span class="name">Caryanams</span>
      <span class="role">👑 Super Admin Portal</span>
    </div>
  </div>

  <div class="login-card">
    <h2>Super Admin Login</h2>
    <p>Full system access. Sign in with your admin credentials.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-login {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin.login') }}">
      <div class="login-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required autofocus>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign In as Super Admin →</button>
    </form>
  </div>

  <div class="divider text-center">
    <a href="{{ url_for('admin.sub_admin_login') }}" class="btn btn-primary">
        🔑 Sub-Admin Login
    </a>
  </div>
  <div class="divider" style="margin-top:10px">
    <a href="{{ url_for('auth.login') }}">← Back to main site</a>
  </div>
</div>
</body>
</html>
