<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<script src="{{ url_for('static', filename='js/csrf.js') }}"></script>
<title>Supreme Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0e0f1a;border:1px solid #1a1b2e;border-radius:18px;padding:42px 38px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:22px;height:22px;fill:white}
.logo-text{font-size:18px;font-weight:800;color:#e2e8f0}
.logo-sub{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:2px;margin-top:1px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;color:#e2e8f0}
.sub{text-align:center;color:#475569;font-size:12px;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-control{width:100%;background:#13141f;border:1px solid #1a1b2e;border-radius:8px;padding:10px 13px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s}
.form-control:focus{border-color:#6366f1}
.form-control::placeholder{color:#475569}
.btn{width:100%;padding:11px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:opacity .15s;letter-spacing:.3px}
.btn:hover{opacity:.9}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:18px;text-align:center}
.lock{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:22px;font-size:11px;color:#334155}
.lock svg{width:12px;height:12px;fill:#334155}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div>
      <div class="logo-text">Supreme Panel</div>
      <div class="logo-sub">Owner Access Only</div>
    </div>
  </div>

  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('owner.login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-control" type="text" name="u" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" name="p" autocomplete="off" required>
    </div>
    <button class="btn" type="submit">Enter Supreme Panel</button>
  </form>

  <div class="lock">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Restricted access. All activity is monitored.
  </div>
</div>
</body>
</html>
